<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Layout de Fotos - EdyMichaelCover</title>
<style>
  :root{
    --bg:#050505;
    --card:#121212;
    --gold:#d4af37;
    --gold2:#ffe08a;
    --text:#ffffff;
    --muted:#bdbdbd;
    --danger:#ff4d4d;
    --ok:#00d26a;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#000,#171717);
    color:var(--text);
    padding:16px;
  }

  header{
    text-align:center;
    border:2px solid var(--gold);
    border-radius:18px;
    padding:18px;
    background:radial-gradient(circle at top,#2a2109,#090909 65%);
    margin-bottom:16px;
    box-shadow:0 0 18px rgba(212,175,55,.25);
  }

  header h1{
    margin:0;
    color:var(--gold2);
    text-transform:uppercase;
    letter-spacing:1px;
  }

  header p{
    color:var(--muted);
    margin:8px 0 0;
  }

  .painel{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:12px;
    background:var(--card);
    border:1px solid #333;
    border-radius:16px;
    padding:14px;
    margin-bottom:16px;
  }

  label{
    font-size:13px;
    color:var(--gold2);
    display:block;
    margin-bottom:6px;
  }

  input, select, textarea, button{
    width:100%;
    border-radius:10px;
    border:1px solid #444;
    background:#050505;
    color:white;
    padding:10px;
    font-size:14px;
  }

  textarea{min-height:70px; resize:vertical}

  button{
    cursor:pointer;
    border:1px solid var(--gold);
    background:linear-gradient(135deg,#6b4f00,#d4af37);
    color:#000;
    font-weight:bold;
  }

  button:hover{filter:brightness(1.1)}

  .btn-red{
    background:linear-gradient(135deg,#5a0000,#ff4d4d);
    color:white;
    border-color:#ff4d4d;
  }

  .btn-dark{
    background:#111;
    color:var(--gold2);
    border-color:var(--gold);
  }

  .layout-area{
    background:#080808;
    border:2px dashed var(--gold);
    border-radius:18px;
    padding:16px;
    min-height:350px;
  }

  .titulo-layout{
    text-align:center;
    margin-bottom:14px;
  }

  .titulo-layout h2{
    margin:0;
    color:var(--gold2);
    text-transform:uppercase;
  }

  .titulo-layout p{
    margin:6px 0 0;
    color:var(--muted);
  }

  .grid{
    display:grid;
    gap:12px;
  }

  .grid.col-1{grid-template-columns:1fr}
  .grid.col-2{grid-template-columns:repeat(2,1fr)}
  .grid.col-3{grid-template-columns:repeat(3,1fr)}
  .grid.col-4{grid-template-columns:repeat(4,1fr)}

  .foto-card{
    background:#111;
    border:1px solid #333;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 0 12px rgba(0,0,0,.45);
    position:relative;
  }

  .foto-card img{
    width:100%;
    height:230px;
    object-fit:cover;
    display:block;
    background:#000;
  }

  .foto-info{
    padding:10px;
    border-top:1px solid #333;
  }

  .foto-info h3{
    margin:0 0 5px;
    color:var(--gold2);
    font-size:16px;
  }

  .foto-info p{
    margin:0;
    color:#ddd;
    font-size:13px;
    line-height:1.4;
  }

  .acoes-card{
    display:flex;
    gap:8px;
    padding:10px;
  }

  .acoes-card button{
    padding:8px;
    font-size:12px;
  }

  .vazio{
    text-align:center;
    color:var(--muted);
    padding:35px;
    border:1px dashed #444;
    border-radius:14px;
  }

  footer{
    text-align:center;
    color:var(--muted);
    margin-top:14px;
    font-size:12px;
  }

  @media(max-width:700px){
    body{padding:10px}
    .grid.col-3,.grid.col-4{grid-template-columns:repeat(2,1fr)}
    .foto-card img{height:170px}
  }

  @media(max-width:480px){
    .grid.col-2,.grid.col-3,.grid.col-4{grid-template-columns:1fr}
  }

  @media print{
    body{
      background:white;
      color:black;
      padding:0;
    }
    .painel,.acoes-card,.no-print{
      display:none !important;
    }
    header,.layout-area{
      box-shadow:none;
      border-color:#000;
    }
    header{
      background:white;
      color:black;
    }
    header h1,.titulo-layout h2,.foto-info h3{
      color:#000;
    }
    .layout-area{
      background:white;
      padding:10px;
    }
    .foto-card{
      break-inside:avoid;
      border:1px solid #000;
      box-shadow:none;
    }
    .foto-info p, header p, .titulo-layout p{
      color:#222;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Layout de Fotos</h1>
  <p>Adicione fotos, organize em colunas e salve o layout em PDF</p>
</header>

<section class="painel no-print">
  <div>
    <label>Título do layout</label>
    <input type="text" id="titulo" placeholder="Ex: Figurino Dangerous" oninput="atualizarCabecalho()">
  </div>

  <div>
    <label>Descrição do layout</label>
    <input type="text" id="descricaoLayout" placeholder="Ex: Fotos para referência de figurino" oninput="atualizarCabecalho()">
  </div>

  <div>
    <label>Formato de colunas</label>
    <select id="colunas" onchange="mudarColunas()">
      <option value="1">1 foto por linha</option>
      <option value="2" selected>2 fotos por linha</option>
      <option value="3">3 fotos por linha</option>
      <option value="4">4 fotos por linha</option>
    </select>
  </div>

  <div>
    <label>Adicionar foto</label>
    <input type="file" id="fotoInput" accept="image/*">
  </div>

  <div>
    <label>Nome da foto</label>
    <input type="text" id="nomeFoto" placeholder="Ex: Frente do casaco">
  </div>

  <div>
    <label>Descrição da foto</label>
    <textarea id="descricaoFoto" placeholder="Ex: Detalhes pretos na manga, gola e ombro"></textarea>
  </div>

  <div>
    <label>Ação</label>
    <button onclick="adicionarFoto()">Adicionar Foto</button>
  </div>

  <div>
    <label>Salvar</label>
    <button class="btn-dark" onclick="window.print()">Salvar / Imprimir PDF</button>
  </div>

  <div>
    <label>Limpar</label>
    <button class="btn-red" onclick="limparTudo()">Limpar Layout</button>
  </div>
</section>

<main class="layout-area">
  <div class="titulo-layout">
    <h2 id="tituloFinal">Meu Layout de Fotos</h2>
    <p id="descricaoFinal">Organização visual com fotos adicionadas</p>
  </div>

  <div id="gridFotos" class="grid col-2">
    <div class="vazio" id="mensagemVazia">Nenhuma foto adicionada ainda.</div>
  </div>
</main>

<footer class="no-print">
  Sistema simples com salvamento automático no navegador.
</footer>

<script>
  let fotos = JSON.parse(localStorage.getItem('layoutFotosEdy')) || [];
  let config = JSON.parse(localStorage.getItem('layoutFotosConfigEdy')) || {
    titulo:'Meu Layout de Fotos',
    descricao:'Organização visual com fotos adicionadas',
    colunas:'2'
  };

  document.getElementById('titulo').value = config.titulo;
  document.getElementById('descricaoLayout').value = config.descricao;
  document.getElementById('colunas').value = config.colunas;

  function salvar(){
    localStorage.setItem('layoutFotosEdy', JSON.stringify(fotos));
    localStorage.setItem('layoutFotosConfigEdy', JSON.stringify(config));
  }

  function atualizarCabecalho(){
    config.titulo = document.getElementById('titulo').value || 'Meu Layout de Fotos';
    config.descricao = document.getElementById('descricaoLayout').value || 'Organização visual com fotos adicionadas';
    document.getElementById('tituloFinal').textContent = config.titulo;
    document.getElementById('descricaoFinal').textContent = config.descricao;
    salvar();
  }

  function mudarColunas(){
    config.colunas = document.getElementById('colunas').value;
    const grid = document.getElementById('gridFotos');
    grid.className = 'grid col-' + config.colunas;
    salvar();
  }

  function adicionarFoto(){
    const input = document.getElementById('fotoInput');
    const nome = document.getElementById('nomeFoto').value || 'Foto sem nome';
    const descricao = document.getElementById('descricaoFoto').value || 'Sem descrição';

    if(!input.files || !input.files[0]){
      alert('Escolha uma foto primeiro.');
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e){
      fotos.push({
        id: Date.now(),
        nome,
        descricao,
        imagem:e.target.result,
        data:new Date().toLocaleString('pt-BR')
      });

      document.getElementById('fotoInput').value = '';
      document.getElementById('nomeFoto').value = '';
      document.getElementById('descricaoFoto').value = '';
      salvar();
      renderizar();
    };
    reader.readAsDataURL(input.files[0]);
  }

  function removerFoto(id){
    if(confirm('Deseja apagar esta foto do layout?')){
      fotos = fotos.filter(f => f.id !== id);
      salvar();
      renderizar();
    }
  }

  function moverFoto(id, direcao){
    const index = fotos.findIndex(f => f.id === id);
    const novoIndex = index + direcao;

    if(novoIndex < 0 || novoIndex >= fotos.length) return;

    const temp = fotos[index];
    fotos[index] = fotos[novoIndex];
    fotos[novoIndex] = temp;
    salvar();
    renderizar();
  }

  function limparTudo(){
    if(confirm('Tem certeza que deseja limpar todas as fotos?')){
      fotos = [];
      salvar();
      renderizar();
    }
  }

  function renderizar(){
    atualizarCabecalho();
    mudarColunas();

    const grid = document.getElementById('gridFotos');
    grid.innerHTML = '';

    if(fotos.length === 0){
      grid.innerHTML = '<div class="vazio" id="mensagemVazia">Nenhuma foto adicionada ainda.</div>';
      return;
    }

    fotos.forEach((foto, index) => {
      const card = document.createElement('div');
      card.className = 'foto-card';
      card.innerHTML = `
        <img src="${foto.imagem}" alt="${foto.nome}">
        <div class="foto-info">
          <h3>${foto.nome}</h3>
          <p>${foto.descricao}</p>
          <p style="margin-top:6px;font-size:11px;color:#999;">Adicionado em: ${foto.data}</p>
        </div>
        <div class="acoes-card no-print">
          <button class="btn-dark" onclick="moverFoto(${foto.id}, -1)">↑ Subir</button>
          <button class="btn-dark" onclick="moverFoto(${foto.id}, 1)">↓ Descer</button>
          <button class="btn-red" onclick="removerFoto(${foto.id})">Apagar</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  renderizar();
</script>
<hr>
<a href="page13.html"><h3>Voltar para a página principal</h3></a>
</body>
</html>
